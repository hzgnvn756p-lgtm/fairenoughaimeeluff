<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fair Enough Aimee Luff - Operations Consulting</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Left Section -->
        <div class="left-section">
            <header>
                <h1 class="logo">Fair Enough Aimee Luff</h1>
                <a href="#" class="follow-btn">FOLLOW US</a>
            </header>

            <div class="main-content">
                <h2 class="main-heading">Creating Clarity<br>from Chaos.</h2>

                <div class="info-grid">
                    <div class="info-block">
                        <p class="info-label">SERVICES</p>
                        <p class="info-text">Operations Support<br>Strategic Planning</p>
                    </div>
                    <div class="icon-block">
                        <div class="icon"></div>
                    </div>
                    <div class="info-block">
                        <p class="info-label">CONTACT</p>
                        <p class="info-text">hello@fairenoughaimeeluff.com<br>(555) 555-5555</p>
                    </div>
                </div>
            </div>

            <div class="footer-content">
                <form class="email-form">
                    <input type="email" placeholder="Email Address" required>
                    <button type="submit" class="sign-up-btn">SIGN UP</button>
                </form>
            </div>
        </div>

        <!-- Right Section -->
        <div class="right-section">
            <div class="image-placeholder">
                <div class="shelf">
                    <div class="shelf-item item-1"></div>
                    <div class="shelf-item item-2"></div>
                    <div class="shelf-item item-3"></div>
                </div>
                <div class="shelf">
                    <div class="shelf-item item-4"></div>
                    <div class="shelf-item item-5"></div>
                    <div class="shelf-item item-6"></div>
                </div>
                <div class="shelf">
                    <div class="shelf-item item-7"></div>
                    <div class="shelf-item item-8"></div>
                    <div class="shelf-item item-9"></div>
                </div>
                <div class="furniture">
                    <div class="ottoman"></div>
                    <div class="couch"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
